name: coverage-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Coverage Gate
        run: npm run test:coverage

      - name: Check version bump (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- src/ | grep -q '^src/'; then
            LOCAL=$(node -p "require('./package.json').version")
            PUBLISHED=$(npm view "@ouro.bot/cli@${LOCAL}" version 2>/dev/null || echo "")
            if [ "$LOCAL" = "$PUBLISHED" ]; then
              echo ""
              echo "::error::@ouro.bot/cli@${LOCAL} is already published on npm."
              echo ""
              echo "Bump the version before merging:"
              echo "  npm version prerelease --preid=alpha"
              echo "  git push"
              echo ""
              exit 1
            fi
            echo "@ouro.bot/cli@${LOCAL} is not yet published — ready to merge and publish"
          else
            echo "No src/ changes detected — version bump not required"
          fi

      - name: Build for wrapper publish guard (PRs only)
        if: github.event_name == 'pull_request'
        run: npm run build

      - name: Check ouro.bot wrapper publish sync (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          node - <<'NODE'
          const { execSync } = require('child_process')
          const { assessWrapperPublishSync } = require('./dist/heart/daemon/wrapper-publish-guard.js')

          const changedFiles = execSync(
            'git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- packages/ouro.bot/',
            { encoding: 'utf-8' },
          ).trim().split('\n').filter(Boolean)

          const localVersion = require('./packages/ouro.bot/package.json').version
          let publishedVersion = ''
          try {
            publishedVersion = execSync(`npm view "ouro.bot@${localVersion}" version`, {
              encoding: 'utf-8',
              stdio: ['ignore', 'pipe', 'ignore'],
            }).trim()
          } catch {
            publishedVersion = ''
          }

          const result = assessWrapperPublishSync({ changedFiles, localVersion, publishedVersion })
          if (!result.ok) {
            console.error(`::error::${result.message}`)
            process.exit(1)
          }
          console.log(result.message)
          NODE

      - name: Upload Coverage Gate Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-gate-artifacts
          path: ${{ env.HOME }}/.agentstate/test-runs/ouroboros-agent-harness

  publish:
    needs: coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install latest npm (trusted publishing requires >=11.5.1)
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish @ouro.bot/cli
        run: npm publish --access public --provenance --tag alpha

      - name: Build for wrapper publish guard
        run: npm run build

      - name: Publish ouro.bot (if wrapper sync passes)
        run: |
          node - <<'NODE'
          const { execSync } = require('child_process')
          const { assessWrapperPublishSync } = require('./dist/heart/daemon/wrapper-publish-guard.js')

          const changedFiles = execSync(
            'git diff-tree --no-commit-id --name-only -r HEAD -- packages/ouro.bot/',
            { encoding: 'utf-8' },
          ).trim().split('\n').filter(Boolean)

          const localVersion = require('./packages/ouro.bot/package.json').version
          let publishedVersion = ''
          try {
            publishedVersion = execSync(`npm view "ouro.bot@${localVersion}" version`, {
              encoding: 'utf-8',
              stdio: ['ignore', 'pipe', 'ignore'],
            }).trim()
          } catch {
            publishedVersion = ''
          }

          const result = assessWrapperPublishSync({ changedFiles, localVersion, publishedVersion })
          if (!result.ok) {
            console.error(result.message)
            process.exit(1)
          }
          if (changedFiles.length === 0) {
            console.log('wrapper package unchanged')
            process.exit(0)
          }
          if (publishedVersion === localVersion) {
            console.log(`ouro.bot@${localVersion} already published, skipping`)
            process.exit(0)
          }
          console.log(result.message)
          NODE
          cd packages/ouro.bot && npm publish --access public --provenance --tag latest
