name: coverage-gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      # Fast-fail publish-sync checks run BEFORE the ~2+ minute coverage gate
      # so a missing version bump or wrapper drift surfaces in under a minute
      # instead of after the full test suite finishes. Previously these ran
      # after coverage, so contributors waited for coverage to pass only to
      # then see a fast check fail.
      - name: Check version bump (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- src/ ":(exclude)src/__tests__/**" | grep -q '^src/'; then
            LOCAL=$(node -p "require('./package.json').version")
            PUBLISHED=$(npm view "@ouro.bot/cli@${LOCAL}" version 2>/dev/null || echo "")
            if [ "$LOCAL" = "$PUBLISHED" ]; then
              echo ""
              echo "::error::@ouro.bot/cli@${LOCAL} is already published on npm."
              echo ""
              echo "Bump the version before merging:"
              echo "  npm version prerelease --preid=alpha"
              echo "  git push"
              echo ""
              exit 1
            fi
            echo "@ouro.bot/cli@${LOCAL} is not yet published — ready to merge and publish"
          else
            echo "No releasable src/ changes detected — version bump not required"
          fi

      - name: Build for wrapper publish guard (PRs only)
        if: github.event_name == 'pull_request'
        run: npm run build

      - name: Check ouro.bot wrapper publish sync (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          node - <<'NODE'
          const { execSync } = require('child_process')
          const { assessWrapperPublishSync } = require('./dist/heart/versioning/wrapper-publish-guard.js')

          const changedFiles = execSync(
            'git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- packages/ouro.bot/',
            { encoding: 'utf-8' },
          ).trim().split('\n').filter(Boolean)

          const localVersion = require('./packages/ouro.bot/package.json').version
          const cliVersion = require('./package.json').version
          let publishedVersion = ''
          try {
            publishedVersion = execSync(`npm view "ouro.bot@${localVersion}" version`, {
              encoding: 'utf-8',
              stdio: ['ignore', 'pipe', 'ignore'],
            }).trim()
          } catch {
            publishedVersion = ''
          }

          const result = assessWrapperPublishSync({ changedFiles, localVersion, cliVersion, publishedVersion })
          if (!result.ok) {
            console.error(`::error::${result.message}`)
            process.exit(1)
          }
          console.log(result.message)
          NODE

      - name: Run Coverage Gate
        run: npm run test:coverage

      - name: Resolve Coverage Artifact Root
        if: always()
        run: |
          COVERAGE_ARTIFACT_ROOT=$(node - <<'NODE'
          const { tmpdir } = require('os')
          const { join } = require('path')
          console.log(join(tmpdir(), 'ouroboros-test-runs', 'ouroboros-agent-harness'))
          NODE
          )
          echo "COVERAGE_ARTIFACT_ROOT=${COVERAGE_ARTIFACT_ROOT}" >> "$GITHUB_ENV"

      - name: Upload Coverage Gate Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-gate-artifacts
          path: ${{ env.COVERAGE_ARTIFACT_ROOT }}
          if-no-files-found: ignore

  publish:
    needs: coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install latest npm (trusted publishing requires >=11.5.1)
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish @ouro.bot/cli
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "@ouro.bot/cli@${LOCAL}" version 2>/dev/null || echo "")
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "@ouro.bot/cli@${LOCAL} already published — skipping"
          else
            npm publish --access public --provenance --tag alpha
          fi

      - name: Build for wrapper publish guard
        run: npm run build

      - name: Check ouro.bot wrapper publish needed
        id: wrapper-check
        run: |
          node - <<'NODE'
          const fs = require('fs')
          const { execSync } = require('child_process')
          const { assessWrapperPublishSync } = require('./dist/heart/versioning/wrapper-publish-guard.js')

          const changedFiles = execSync(
            'git diff-tree --no-commit-id --name-only -r HEAD -- packages/ouro.bot/',
            { encoding: 'utf-8' },
          ).trim().split('\n').filter(Boolean)

          const localVersion = require('./packages/ouro.bot/package.json').version
          const cliVersion = require('./package.json').version
          let publishedVersion = ''
          try {
            publishedVersion = execSync(`npm view "ouro.bot@${localVersion}" version`, {
              encoding: 'utf-8',
              stdio: ['ignore', 'pipe', 'ignore'],
            }).trim()
          } catch {
            publishedVersion = ''
          }

          const result = assessWrapperPublishSync({ changedFiles, localVersion, cliVersion, publishedVersion })
          if (!result.ok) {
            console.error(result.message)
            process.exit(1)
          }
          if (publishedVersion === localVersion) {
            console.log(`ouro.bot@${localVersion} already published — skipping`)
            process.exit(0)
          }
          console.log(result.message)
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'should_publish=true\n')
          NODE

      - name: Publish ouro.bot
        if: steps.wrapper-check.outputs.should_publish == 'true'
        run: |
          cd packages/ouro.bot
          npm publish --access public --provenance --tag latest

      - name: Verify supported npm dist-tags
        run: |
          LOCAL=$(node -p "require('./package.json').version")

          CLI_ALPHA=$(npm view "@ouro.bot/cli@alpha" version 2>/dev/null || echo "")
          if [ "$CLI_ALPHA" != "$LOCAL" ]; then
            echo "::error::@ouro.bot/cli@alpha points at ${CLI_ALPHA:-missing}, expected ${LOCAL}"
            exit 1
          fi

          WRAPPER_LATEST=$(npm view "ouro.bot@latest" version 2>/dev/null || echo "")
          if [ "$WRAPPER_LATEST" != "$LOCAL" ]; then
            echo "::error::ouro.bot@latest points at ${WRAPPER_LATEST:-missing}, expected ${LOCAL}"
            exit 1
          fi

          echo "supported npm dist-tags verified for ${LOCAL}"
