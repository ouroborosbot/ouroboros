name: coverage-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Coverage Gate
        run: npm run test:coverage

      - name: Upload Coverage Gate Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-gate-artifacts
          path: ${{ env.HOME }}/.agentstate/test-runs/ouroboros-agent-harness

  publish:
    needs: coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install latest npm (trusted publishing requires >=11.5.1)
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: npm ci

      - name: Derive next CLI version from npm registry
        run: |
          CURRENT=$(npm view @ouro.bot/cli dist-tags.alpha 2>/dev/null || echo "0.1.0-alpha.0")
          NEXT=$((${CURRENT##*.} + 1))
          npm version "0.1.0-alpha.${NEXT}" --no-git-tag-version
          echo "Publishing @ouro.bot/cli@0.1.0-alpha.${NEXT}"

      - name: Build
        run: npm run build

      - name: Publish @ouro.bot/cli
        run: npm publish --access public --provenance --tag alpha

      - name: Derive next wrapper version from npm registry
        working-directory: packages/ouro.bot
        run: |
          CURRENT=$(npm view ouro.bot dist-tags.alpha 2>/dev/null || echo "0.1.0-alpha.0")
          NEXT=$((${CURRENT##*.} + 1))
          npm version "0.1.0-alpha.${NEXT}" --no-git-tag-version
          echo "Publishing ouro.bot@0.1.0-alpha.${NEXT}"

      - name: Publish ouro.bot
        working-directory: packages/ouro.bot
        run: npm publish --access public --provenance --tag alpha
