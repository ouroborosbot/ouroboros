name: coverage-gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      # Fast-fail release metadata preflight runs BEFORE the ~2+ minute coverage gate
      # so missing version bumps, wrapper drift, and changelog misses surface locally
      # and in CI before the full test suite starts.
      - name: Release preflight (PRs only)
        if: github.event_name == 'pull_request'
        run: npm run release:preflight -- --base-ref "origin/${{ github.base_ref }}"

      - name: Run Coverage Gate
        run: npm run test:coverage

      - name: Resolve Coverage Artifact Root
        if: always()
        run: |
          COVERAGE_ARTIFACT_ROOT=$(node - <<'NODE'
          const { tmpdir } = require('os')
          const { join } = require('path')
          console.log(join(tmpdir(), 'ouroboros-test-runs', 'ouroboros-agent-harness'))
          NODE
          )
          echo "COVERAGE_ARTIFACT_ROOT=${COVERAGE_ARTIFACT_ROOT}" >> "$GITHUB_ENV"

      - name: Upload Coverage Gate Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-gate-artifacts
          path: ${{ env.COVERAGE_ARTIFACT_ROOT }}
          if-no-files-found: ignore

  publish:
    needs: coverage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install latest npm (trusted publishing requires >=11.5.1)
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish @ouro.bot/cli
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "@ouro.bot/cli@${LOCAL}" version 2>/dev/null || echo "")
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            echo "@ouro.bot/cli@${LOCAL} already published — skipping"
          else
            npm publish --access public --provenance --tag latest
          fi

      - name: Build for wrapper publish guard
        run: npm run build

      - name: Check ouro.bot wrapper publish needed
        id: wrapper-check
        run: |
          node - <<'NODE'
          const fs = require('fs')
          const { execSync } = require('child_process')
          const { assessWrapperPublishSync } = require('./dist/heart/versioning/wrapper-publish-guard.js')

          const changedFiles = execSync(
            'git diff-tree --no-commit-id --name-only -r HEAD -- packages/ouro.bot/',
            { encoding: 'utf-8' },
          ).trim().split('\n').filter(Boolean)

          const localVersion = require('./packages/ouro.bot/package.json').version
          const cliVersion = require('./package.json').version
          let publishedVersion = ''
          try {
            publishedVersion = execSync(`npm view "ouro.bot@${localVersion}" version`, {
              encoding: 'utf-8',
              stdio: ['ignore', 'pipe', 'ignore'],
            }).trim()
          } catch {
            publishedVersion = ''
          }

          const result = assessWrapperPublishSync({ changedFiles, localVersion, cliVersion, publishedVersion })
          if (!result.ok) {
            console.error(result.message)
            process.exit(1)
          }
          if (publishedVersion === localVersion) {
            console.log(`ouro.bot@${localVersion} already published — skipping`)
            process.exit(0)
          }
          console.log(result.message)
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'should_publish=true\n')
          NODE

      - name: Publish ouro.bot
        if: steps.wrapper-check.outputs.should_publish == 'true'
        run: |
          cd packages/ouro.bot
          npm publish --access public --provenance --tag latest

      - name: Verify supported npm dist-tags
        run: |
          LOCAL=$(node -p "require('./package.json').version")

          verify_tag() {
            package_ref="$1"
            expected="$2"

            for attempt in 1 2 3 4 5 6; do
              actual=$(npm view "$package_ref" version 2>/dev/null || echo "")
              if [ "$actual" = "$expected" ]; then
                echo "${package_ref} verified at ${expected}"
                return 0
              fi

              if [ "$attempt" != "6" ]; then
                echo "${package_ref} points at ${actual:-missing}, expected ${expected}; retrying after npm propagation delay"
                sleep 10
              fi
            done

            echo "::error::${package_ref} points at ${actual:-missing}, expected ${expected}"
            return 1
          }

          verify_tag "@ouro.bot/cli@latest" "$LOCAL"
          verify_tag "ouro.bot@latest" "$LOCAL"

          echo "supported npm dist-tags verified for ${LOCAL}"

      - name: Smoke published package binaries
        run: npm run release:smoke
