name: coverage-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Coverage Gate
        run: npm run test:coverage

      - name: Upload Coverage Gate Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-gate-artifacts
          path: ${{ env.HOME }}/.agentstate/test-runs/ouroboros-agent-harness
